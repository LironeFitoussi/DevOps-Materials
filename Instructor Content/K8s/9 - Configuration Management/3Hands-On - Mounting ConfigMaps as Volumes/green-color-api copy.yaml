apiVersion: v1
kind: Pod
metadata:
  name: green-color-api
  labels:
    app: green-color-api
spec:
  containers:
    - name: color-api
      image: lironefitoussi/color-api:1.3.0
      ports:
        - containerPort: 80
      envFrom:
        - configMapRef:
            name: green-env-vars
      volumeMounts:
        - name: color-config
          mountPath: /mnt/config
          readOnly: true
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
  volumes:
    - name: color-config
      configMap:
        name: green-files
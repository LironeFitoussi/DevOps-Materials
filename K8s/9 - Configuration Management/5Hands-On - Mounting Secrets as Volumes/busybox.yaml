apiVersion: v1
kind: Pod
metadata:
  name: busybox
spec:
  containers:
    - name: busybox
      image: busybox:1.36.1
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
      command: ["sleep", "3600"]
      volumeMounts:
        - name: db-secrets
          mountPath: /etc/db
  volumes:
    - name: db-secrets
      secret:
        secretName: db-creds
        items:
          - key: password
            path: dev/password
  # volumes:
  # - name: db-secrets
  #   secret:
  #     secretName: db-creds
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: orders-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # image: [DOCKER_USERNAME/mern-backend:latest]
          ports:
            - containerPort: 3000
          # Inject MONGO_URI and JWT_SECRET from app-secrets
          envFrom:
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Pod is not sent traffic until /health returns 200
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

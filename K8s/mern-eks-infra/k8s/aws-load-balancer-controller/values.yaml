# Helm values for AWS Load Balancer Controller
# Docs: https://github.com/aws/eks-charts/tree/master/stable/aws-load-balancer-controller
#
# Prerequisites:
#   1. Create IAM policy: AWSLoadBalancerControllerIAMPolicy
#   2. Create IRSA role with that policy attached
#   3. Tag VPC subnets:
#      Public subnets:  kubernetes.io/role/elb = 1
#      Private subnets: kubernetes.io/role/internal-elb = 1
#
# Install:
#   helm repo add eks https://aws.github.io/eks-charts
#   helm repo update
#   helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#     --namespace kube-system \
#     -f k8s/aws-load-balancer-controller/values.yaml

# TODO: replace with your EKS cluster name
clusterName: <CLUSTER_NAME>

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    # TODO: replace <ACCOUNT_ID> with your AWS account ID
    eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/AWSLoadBalancerControllerRole

# Run 2 replicas for high availability
replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

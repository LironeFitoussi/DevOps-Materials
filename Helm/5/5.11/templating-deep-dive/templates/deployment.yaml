apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "templating-deep-dive.fullname" . }}
  labels: 
    {{- include "templating-deep-dive.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{ include "templating-deep-dive.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{ include "templating-deep-dive.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.name }}:{{ .Values.image.tag }}"
          {{- with .Values.securityContext | default dict }}
          # {{ . }} is the securityContext map
          {{- if and (hasKey . "enabled") .enabled }}
          securityContext:
            runAsUser: {{ required "runAsUser is required" .runAsUser }}
            fsGroup: {{ required "runAsGroup is required" .fsGroup }}
          {{- end }}
          {{- end }}
          {{- if (.Values.services | default dict | len) }}
          ports:
            - containerPort: {{ $.Values.containerPort }}
          {{- end }}